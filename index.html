<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>carbomint | Terminal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;800&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0a0a0c; --accent: #fff; --text-dim: #888; --border: rgba(255, 255, 255, 0.05); }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(rgba(10, 10, 12, 0.8), rgba(10, 10, 12, 0.95)), 
                        url('https://i.pinimg.com/736x/d7/57/ff/d757ff47f222c04d880ae5f57d6507f2.jpg');
            background-size: cover; background-position: center; background-attachment: fixed;
            color: #e0e0e6; font-family: 'Inter', sans-serif; height: 100vh; overflow: hidden;
        }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }

        nav {
            display: flex; justify-content: center; align-items: center; padding: 25px;
            background: rgba(10, 10, 12, 0.7); backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border); position: fixed; width: 100%; top: 0; z-index: 1000;
        }
        .logo { position: absolute; left: 50px; font-weight: 800; letter-spacing: -1px; font-size: 1.1rem; color: #fff; }
        nav ul { display: flex; list-style: none; gap: 40px; }
        nav a { color: var(--text-dim); text-decoration: none; font-size: 12px; font-weight: 500; text-transform: uppercase; letter-spacing: 2px; transition: 0.3s; }
        nav a.active, nav a:hover { color: #fff; }

        .hero {
            height: 100vh; display: flex; flex-direction: column;
            justify-content: center; align-items: center; text-align: center; padding: 20px;
        }
        .hero span { font-family: 'Fira Code', monospace; font-size: 12px; color: #444; letter-spacing: 5px; text-transform: uppercase; margin-bottom: 15px; }
        .hero h1 { font-size: clamp(3rem, 10vw, 6rem); font-weight: 800; letter-spacing: -4px; color: #fff; line-height: 1; margin-bottom: 20px; }
        .hero p { color: var(--text-dim); max-width: 500px; font-size: 1rem; margin-bottom: 40px; line-height: 1.6; }

        .btn-group { display: flex; gap: 15px; }
        .btn {
            padding: 14px 32px; border-radius: 4px; text-decoration: none;
            font-family: 'Fira Code', monospace; font-size: 12px; font-weight: 600; transition: 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }
        .btn-p { background: #fff; color: #000; }
        .btn-s { background: rgba(255,255,255,0.03); color: #fff; border: 1px solid var(--border); }
        .btn:hover { transform: translateY(-5px); box-shadow: 0 15px 30px rgba(0,0,0,0.5); background: #eee; color: #000; }

        footer {
            position: fixed; bottom: 0; width: 100%; padding: 30px 50px;
            display: flex; justify-content: space-between; align-items: center;
            background: linear-gradient(transparent, rgba(10,10,12,0.9));
        }
        .status { font-family: 'Fira Code', monospace; font-size: 10px; color: #333; display: flex; align-items: center; gap: 8px; }
        .dot { width: 6px; height: 6px; background: #00ff88; border-radius: 50%; box-shadow: 0 0 10px #00ff88; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    </style>
</head>
<body>
    <nav>
        <div class="logo">carbomint</div>
        <ul>
            <li><a href="index.html" class="active">Home</a></li>
            <li><a href="portfolio.html">Portfolio</a></li>
            <li><a href="posts.html">Posts</a></li>
        </ul>
    </nav>

    <div class="hero">
        <span>ESTABLISHED_2024</span>
        <h1>carbomint</h1>
        <p>Discord bot developer and backend enthusiast. Specializing in Python, automation systems, and scalable moderation utilities.</p>
        <div class="btn-group">
            <a href="portfolio.html" class="btn btn-p">INITIALIZE_PORTFOLIO</a>
            <a href="https://github.com/carbomint" class="btn btn-s">GITHUB_ARCHIVE</a>
        </div>
    </div>

    <footer>
        <div style="font-size: 10px; color: #444; letter-spacing: 1px;">© 2024 ALL_RIGHTS_RESERVED</div>
        <div class="status"><div class="dot"></div>SYSTEM_STATUS: OPERATIONAL</div>
    </footer>
</body>
</html>
